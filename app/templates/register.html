{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1>Create Account</h1>
        <div class="subtitle">Join VulnAIBank</div>

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>SSN (Social Security Number)</label>
                <input type="text" name="ssn" class="form-control" placeholder="XXX-XX-XXXX">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="555-123-4567">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/login" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
